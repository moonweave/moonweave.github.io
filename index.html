<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>phd.ai.log | AI로 연구를 조금 덜 빡세게</title>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #09090b;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-glow: rgba(88, 166, 255, 0.3);
            --gradient-start: #58a6ff;
            --gradient-end: #8b5cf6;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 24px 24px;
            color: var(--text-primary);
            font-family: 'Pretendard', -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 60px 20px;
            box-sizing: border-box;
            background-attachment: fixed;
        }

        body::before {
            content: '';
            position: fixed;
            top: -10%;
            left: 50%;
            transform: translateX(-50%);
            width: 70vw;
            height: 50vh;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.06) 0%, transparent 65%);
            z-index: -1;
            pointer-events: none;
        }

        .container {
            width: 100%;
            max-width: 420px;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .profile-section {
            text-align: center;
            margin-bottom: 44px;
        }

        .profile-img-wrapper {
            display: inline-block;
            padding: 3px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            margin-bottom: 20px;
            box-shadow: 0 8px 32px var(--accent-glow);
        }

        .profile-avatar-cli {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 96px;
            height: 96px;
            border-radius: 50%;
            border: 4px solid var(--bg-color);
            background: #0f141c;
            font-family: 'JetBrains Mono', monospace;
            position: relative;
        }

        .profile-avatar-cli .prompt {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff, #c7d2fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            position: relative;
            left: -1px; 
        }

        .profile-avatar-cli .cursor {
            font-size: 2.2rem;
            font-weight: 400;
            color: var(--gradient-start);
            animation: blink 1.2s step-end infinite;
        }

        @keyframes blink {
            from, to { opacity: 0; }
            50% { opacity: 1; }
        }

        .profile-title {
            font-size: 1.35rem;
            font-weight: 700;
            margin: 0 0 10px 0;
            letter-spacing: -0.01em;
            background: linear-gradient(135deg, #ffffff 0%, #cbd5e1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .profile-desc {
            font-size: 0.95rem;
            color: var(--text-secondary);
            line-height: 1.6;
            margin: 0;
            word-break: keep-all;
        }

        .link-card {
            display: flex;
            align-items: center;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 18px 22px;
            margin-bottom: 16px;
            text-decoration: none;
            color: var(--text-primary);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .link-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.03), transparent);
            transform: translateX(-100%);
            transition: transform 0.6s ease;
        }

        .link-card:hover:not(.disabled-card) {
            transform: translateY(-4px);
            border-color: rgba(88, 166, 255, 0.3);
            background: rgba(255, 255, 255, 0.06);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.6), 0 0 20px rgba(88, 166, 255, 0.15);
        }

        .link-card:hover:not(.disabled-card)::before {
            transform: translateX(100%);
        }

        .icon-box {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 44px;
            height: 44px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            margin-right: 18px;
            color: var(--text-primary);
            transition: all 0.3s ease;
        }

        .link-card:hover:not(.disabled-card) .icon-box {
            background: var(--gradient-start);
            color: #09090b;
            border-color: transparent;
            box-shadow: 0 0 12px rgba(88, 166, 255, 0.4);
        }

        .icon-box svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        .text-box {
            flex: 1;
        }

        .card-title {
            font-size: 1.05rem;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .card-subtitle {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--gradient-start);
            letter-spacing: 0.02em;
        }

        .arrow-icon {
            opacity: 0;
            transform: translateX(-10px);
            transition: all 0.3s ease;
            color: var(--text-secondary);
        }

        .link-card:hover:not(.disabled-card) .arrow-icon {
            opacity: 1;
            transform: translateX(0);
            color: var(--gradient-start);
        }

        .disabled-card {
            opacity: 0.4;
            cursor: not-allowed;
            background: rgba(255, 255, 255, 0.01);
        }
        
        .disabled-card .card-subtitle {
            color: var(--text-secondary);
        }
        
        .footer {
            text-align: center;
            margin-top: 48px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.15);
            letter-spacing: 0.05em;
        }

    </style>
</head>
<body>

    <div class="container">
        
        <div class="profile-section">
            <div class="profile-img-wrapper">
                <div class="profile-avatar-cli">
                    <span class="prompt">&gt;</span><span class="cursor">_</span>
                </div>
            </div>
            <h1 class="profile-title">@phd.ai.log</h1>
            <p class="profile-desc">AI로 연구를 조금 덜 빡세게<br>만든 건 깃허브에, 아이디어는 설문으로</p>
        </div>

        <div class="links-section">

            <a href="https://github.com/moonweave" target="_blank" class="link-card">
                <div class="icon-box">
                    <svg viewBox="0 0 24 24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
                </div>
                <div class="text-box">
                    <div class="card-title">GitHub Repository</div>
                    <div class="card-subtitle">만들어본 것들</div>
                </div>
                <div class="arrow-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                </div>
            </a>

            <a href="./survey.html" class="link-card">
                <div class="icon-box">
                    <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm-1 1.5L18.5 9H13V3.5zM6 20V4h5v6h6v10H6zm2-7h8v2H8v-2zm0 4h8v2H8v-2z"/></svg>
                </div>
                <div class="text-box">
                    <div class="card-title">AI Idea Dropbox</div>
                    <div class="card-subtitle">떠오른 생각 아무거나</div>
                </div>
            </a>

        </div>
        
        <div class="footer">
            build --with researchers
        </div>
    </div>

</body>
</html>
